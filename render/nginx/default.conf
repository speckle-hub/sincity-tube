# ═══════════════════════════════════════════════════════════════════════
# SinCity — Nginx config for Render.com (PHP-FPM backend)
# ═══════════════════════════════════════════════════════════════════════

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    root /var/www/html;
    index index.php;

    # ─── Logs ────────────────────────────────────────────────────
    access_log /dev/stdout;
    error_log  /dev/stderr;

    # ─── Security headers ────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "interest-cohort=(), camera=(), microphone=()" always;

    # ─── No size limit for POST (WP import + embeds) ─────────────
    client_max_body_size 128M;

    # ─── Gzip ────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css text/xml application/json application/javascript image/svg+xml;

    # ─── Static assets (long cache) ──────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|webp|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri $uri/ /index.php?$args;
        access_log off;
        log_not_found off;
    }

    # ─── Uploads ─────────────────────────────────────────────────
    location /wp-content/uploads/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        # For Cloudflare R2 proxy — uncomment when configured:
        # proxy_pass https://<your-r2-bucket>.r2.cloudflarestorage.com/;
        # proxy_set_header Host <your-r2-bucket>.r2.cloudflarestorage.com;
    }

    # ─── Deny sensitive files ────────────────────────────────────
    location ~ /\.(ht|git|env|svn) { deny all; }
    location = /wp-config.php      { deny all; }
    location = /xmlrpc.php         { deny all; access_log off; log_not_found off; }
    location = /readme.html        { deny all; }
    location = /license.txt        { deny all; }
    location ~ /wp-content/uploads/.*\.(php|phar|phtml)$ { deny all; }

    # ─── Health check ────────────────────────────────────────────
    location = /healthz.php {
        access_log off;
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$healthz.php;
        include fastcgi_params;
    }

    # ─── WordPress API endpoints ──────────────────────────────
    location /wp-json/ {
        try_files $uri $uri/ /index.php?$args;
    }

    # ─── Main rewrite ────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        # PHP-FPM env vars from Render
        fastcgi_param WP_HOME          $WP_HOME;
        fastcgi_param WP_SITEURL       $WP_SITEURL;
        fastcgi_param DB_HOST          $DB_HOST;
        fastcgi_param DB_NAME          $DB_NAME;
        fastcgi_param DB_USER          $DB_USER;
        fastcgi_param DB_PASSWORD      $DB_PASSWORD;
    }
}
