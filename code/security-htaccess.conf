# ═══════════════════════════════════════════════════════════════════════
# SinCity — Apache .htaccess Security
# Place in: /var/www/sincity/.htaccess (web root)
# ═══════════════════════════════════════════════════════════════════════

# ─── Block bad bots ────────────────────────────────────────
RewriteEngine On
RewriteCond %{HTTP_USER_AGENT} (ahrefs|majestic|rogerbot|semrush|dotbot|mj12bot|seznambot|screaming|zoominfobot|extractora|python-requests|scrapy|curl) [NC]
RewriteRule .* - [F,L]

# ─── Protect wp-admin (uncomment with your IP) ────────────
# <Files wp-login.php>
#     Order Deny,Allow
#     Deny from all
#     Allow from 123.456.789.0
# </Files>

# ─── Disable PHP in uploads ───────────────────────────────
<IfModule mod_php.c>
    php_flag engine off
</IfModule>
<FilesMatch "\.(php|phar|phtml)$">
    <IfModule mod_authz_core.c>
        Require all denied
    </IfModule>
</FilesMatch>

# ─── Block sensitive files ────────────────────────────────
<FilesMatch "(wp-config\.php|xmlrpc\.php|readme\.html|license\.txt|\.htaccess|\.htpasswd|\.git|\.env|\.DS_Store|error_log)">
    Order Allow,Deny
    Deny from all
</FilesMatch>

# ─── Security headers ─────────────────────────────────────
<IfModule mod_headers.c>
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "interest-cohort=()"
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
</IfModule>

# ─── Cache static assets ──────────────────────────────────
<IfModule mod_expires.c>
    ExpiresActive On
    ExpiresByType image/jpg "access plus 30 days"
    ExpiresByType image/jpeg "access plus 30 days"
    ExpiresByType image/png "access plus 30 days"
    ExpiresByType image/webp "access plus 30 days"
    ExpiresByType image/svg+xml "access plus 30 days"
    ExpiresByType text/css "access plus 30 days"
    ExpiresByType application/javascript "access plus 30 days"
    ExpiresByType text/javascript "access plus 30 days"
    ExpiresByType application/font-woff "access plus 30 days"
    ExpiresByType application/font-woff2 "access plus 30 days"
</IfModule>

# ─── Gzip ─────────────────────────────────────────────────
<IfModule mod_deflate.c>
    AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css text/javascript
    AddOutputFilterByType DEFLATE application/javascript application/json application/xml
    AddOutputFilterByType DEFLATE image/svg+xml
</IfModule>

# ─── WordPress (keep WP defaults below) ───────────────────
# BEGIN WordPress
<IfModule mod_rewrite.c>
RewriteRule ^index\.php$ - [L]
RewriteCond %{REQUEST_FILENAME} !-f
RewriteCond %{REQUEST_FILENAME} !-d
RewriteRule . /index.php [L]
</IfModule>
# END WordPress
