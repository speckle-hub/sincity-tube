# ═══════════════════════════════════════════════════════════════════════
# SinCity — Nginx Security & Performance Config
# Place in: /etc/nginx/sites-available/sincity (inside server block)
# ═══════════════════════════════════════════════════════════════════════

# ─── Block bad bots & scrapers ────────────────────────────
map $http_user_agent $bad_bot {
    default 0;
    ~*(ahrefs|majestic|rogerbot|semrush|dotbot|mj12bot|seznambot|screaming|zoominfobot|extractora) 1;
    ~*(python-requests|scrapy|curl|wget) 1;
}
if ($bad_bot) { return 403; }

# ─── Rate limiting ────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=sincity_login:10m rate=3r/m;
limit_req_zone $binary_remote_addr zone=sincity_api:10m   rate=10r/s;
limit_req_zone $binary_remote_addr zone=sincity_search:10m rate=6r/m;

# ─── Main server block additions ──────────────────────────

# Security headers
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "interest-cohort=(), camera=(), microphone=()" always;
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# ─── Protect login ────────────────────────────────────────
location /wp-login.php {
    limit_req zone=sincity_login burst=1 nodelay;
    try_files $uri $uri/ /index.php?$args;
    # IP whitelist (uncomment and set your IP)
    # allow 123.456.789.0;
    # deny all;
}

location /wp-admin {
    limit_req zone=sincity_login burst=1 nodelay;
    # allow 123.456.789.0;
    # deny all;
    try_files $uri $uri/ /index.php?$args;
}

# ─── Disable PHP execution in uploads ─────────────────────
location ~* /wp-content/uploads/.*\.(php|phtml|php5)$ {
    deny all;
}

# ─── Protect sensitive files ──────────────────────────────
location ~ /\.(ht|git|env|svn|DS_Store) { deny all; }
location = /wp-config.php { deny all; }
location = /xmlrpc.php { deny all; access_log off; log_not_found off; }
location = /readme.html { deny all; }
location = /license.txt { deny all; }

# ─── Search rate limit ────────────────────────────────────
location /search/ {
    limit_req zone=sincity_search burst=2 nodelay;
    try_files $uri $uri/ /index.php?$args;
}

# ─── Static asset caching ─────────────────────────────────
location ~* \.(js|css|png|jpg|jpeg|gif|ico|webp|svg|woff|woff2|ttf|eot)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    access_log off;
    log_not_found off;
    try_files $uri $uri/ /index.php?$args;
}

# ─── WP Rocket cache ──────────────────────────────────────
set $cache_uri $request_uri;
if ($request_uri ~* "(wp-admin|wp-login|xmlrpc|feed|sitemap)") {
    set $cache_uri 'no-cache';
}
include /var/www/sincity/wp-content/plugins/wp-rocket/inc/nginx/rewrite.conf;

# ─── Deny hotlinking ──────────────────────────────────────
location ~* \.(jpg|jpeg|png|gif|webp)$ {
    valid_referers server_names ~\.sincity\. ~\.sincityxxx\.;
    if ($invalid_referer) { return 403; }
    try_files $uri $uri/ /index.php?$args;
}

# ─── Embedded content proxy ───────────────────────────────
